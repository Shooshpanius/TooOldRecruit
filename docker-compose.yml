services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: rosters
      MYSQL_USER: rosters_user
      MYSQL_PASSWORD: rosters_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "rosters_user", "--password=rosters_pass"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./My40kRoaster.Server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db;Port=3306;Database=rosters;User=rosters_user;Password=rosters_pass;"
      Jwt__Key: "${JWT_KEY:-please-change-this-secret-key-in-production-32chars}"
      Jwt__Issuer: "My40kRoaster"
      Jwt__Audience: "My40kRoaster"
      Google__ClientId: "${GOOGLE_CLIENT_ID:-}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
